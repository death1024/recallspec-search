version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: recallspec
      POSTGRES_USER: recallspec
      POSTGRES_PASSWORD: recallspec_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://recallspec:recallspec_dev@postgres:5432/recallspec
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - elasticsearch
      - redis
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  celery-worker:
    build: ./backend
    command: celery -A ingestion.tasks worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://recallspec:recallspec_dev@postgres:5432/recallspec
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - elasticsearch
      - redis
    volumes:
      - ./backend:/app

volumes:
  postgres_data:
  es_data:
  redis_data:
